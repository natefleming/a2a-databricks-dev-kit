command:
  # Use shell-form so $DATABRICKS_APP_PORT expands. List-form passes the literal
  # string to uvicorn and crashes with "not a valid integer."
  #
  # PYTHONPATH=src is required for the Apps-from-Git path: Apps clones the repo
  # and runs `pip install -r requirements.txt`, which does NOT install our own
  # source as a package, so the `app` package at src/app/ isn't importable
  # without adding src/ to sys.path. In the bundle path the wheel installs `app`
  # for us, but PYTHONPATH=src is still harmless there.
  - "sh"
  - "-c"
  - "PYTHONPATH=src uvicorn app.main:app --host 0.0.0.0 --port ${DATABRICKS_APP_PORT:-8000}"

env:
  - name: A2A_AGENT_NAME
    value: "my-a2a-agent"
  - name: A2A_AGENT_DESCRIPTION
    value: "An A2A-protocol agent running on Databricks"
  - name: A2A_AGENT_VERSION
    value: "0.1.0"
  - name: A2A_LLM_ENDPOINT
    value: "databricks-claude-sonnet-4-6"
  - name: A2A_LLM_AI_GATEWAY
    value: "false"
  - name: A2A_AUTH_MODE
    value: "bearer"
  - name: A2A_ENV
    value: "dev"
  - name: A2A_CATALOG
    value: "main"
  - name: A2A_SCHEMA
    value: "a2a_agents"
  - name: A2A_BEARER_SECRET_SCOPE
    value: ""
  - name: A2A_BEARER_SECRET_KEY
    value: ""
  - name: A2A_OAUTH_AUDIENCE
    value: ""
  - name: A2A_OAUTH_ISSUER
    value: ""
  - name: A2A_CAPABILITY_STREAMING
    value: "true"
  - name: A2A_CAPABILITY_PUSH_NOTIFICATIONS
    value: "false"
  - name: GEMINI_PROJECT_ID
    value: ""
  - name: GEMINI_LOCATION
    value: "global"
  - name: GEMINI_APP_ID
    value: ""
  - name: GEMINI_ASSISTANT_ID
    value: "default_assistant"
  - name: GEMINI_COLLECTION
    value: "default_collection"

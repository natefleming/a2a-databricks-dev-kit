# Databricks App resource for the A2A agent.
#
# `source_code_path: ../.` means the bundle ships the whole repo (app.yaml at
# root, requirements.txt at root, src/ folder) as the App's source — exactly
# what the Apps-from-Git path uses too. One layout, two deploy mechanisms.
#
# The inner `resources:` list under `apps.a2a_agent_app` is what gives the App
# service principal auto-permissioned access to everything it needs at runtime:
#   - the LLM serving endpoint (CAN_QUERY)
#   - the bearer-token secret (READ), if auth_mode=bearer
# Without these declarations the App boots fine but the first LLM call or
# secret read fails with 403 PERMISSION_DENIED.

resources:
  apps:
    a2a_agent_app:
      name: "${var.agent_name}-${bundle.target}"
      description: "${var.agent_description}"
      source_code_path: "../."
      permissions:
        - level: CAN_USE
          group_name: "users"
      user_api_scopes:
        - "serving.serving-endpoints"
      resources:
        - name: chat-llm
          description: "LLM serving endpoint backing the agent."
          serving_endpoint:
            name: "${var.llm_endpoint}"
            permission: CAN_QUERY
        # Uncomment when auth_mode=bearer and you've provisioned the secret:
        # - name: bearer-token
        #   description: "Inbound A2A bearer token, read at startup."
        #   secret:
        #     scope: "${var.bearer_secret_scope}"
        #     key: "${var.bearer_secret_key}"
        #     permission: READ

  experiments:
    a2a_agent_experiment:
      name: "/Users/${workspace.current_user.userName}/a2a-agents-${var.agent_name}-${bundle.target}"

  # UC schema creation is opt-in. The reference agent doesn't use UC, and most
  # workspaces don't grant CREATE SCHEMA to ordinary users. To enable, uncomment:
  #
  # schemas:
  #   a2a_agent_schema:
  #     catalog_name: "${var.catalog}"
  #     name: "${var.schema}"
  #     grants:
  #       - principal: "${resources.apps.a2a_agent_app.service_principal_client_id}"
  #         privileges:
  #           - USE_SCHEMA
  #           - SELECT
  #           - EXECUTE
